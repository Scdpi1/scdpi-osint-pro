<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SCDPI OSINT PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --text-primary: #ffffff;
            --accent: #ffd700;
            --card-bg: rgba(10, 15, 30, 0.8);
            --border-color: rgba(255, 215, 0, 0.3);
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        
        /* Fundo com globo */
        .globe-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.1) 0%, transparent 70%),
                        #0a0f1e;
        }
        
        .globe-bg::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" opacity="0.2"><path fill="none" stroke="%23ffd700" stroke-width="0.8" d="M200,150 Q300,100 400,150 T600,130 T800,150"/><circle cx="400" cy="150" r="4" fill="%23ffd700"/><circle cx="600" cy="130" r="4" fill="%23ffd700"/><path fill="none" stroke="%23ffd700" stroke-width="0.6" d="M200,250 Q350,200 500,250 T750,230"/><circle cx="350" cy="200" r="3" fill="%23ffd700"/><circle cx="650" cy="230" r="3" fill="%23ffd700"/><path fill="none" stroke="%23ffd700" stroke-width="0.7" d="M150,350 Q300,300 450,350 T700,330"/><circle cx="300" cy="300" r="3.5" fill="%23ffd700"/><circle cx="550" cy="330" r="3.5" fill="%23ffd700"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            pointer-events: none;
        }
        
        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
        }
        
        .login-title {
            font-size: 2.5em;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .login-title span {
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .login-subtitle {
            text-align: center;
            color: #b0b0b0;
            margin-bottom: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent);
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 1.1em;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(145deg, var(--accent), #ccaa00);
            color: #000;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 30px rgba(255, 215, 0, 0.4);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: #b0b0b0;
        }
        
        .login-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .alert {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff4444;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            color: #ff8888;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="globe-bg"></div>
    
    <div class="container">
        <div class="login-card">
            <div class="login-title">
                <span>SCDPI</span> OSINT PRO
            </div>
            <div class="login-subtitle">
                Acesse sua conta
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="/login">
                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-control" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            
            <div class="login-footer">
                Não tem conta? <a href="/registro">Registre-se</a>
            </div>
        </div>
    </div>
</body>
</html>
