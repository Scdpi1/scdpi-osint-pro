<!-- background.html - Fundo global com efeito de globo luminoso -->
<style>
.global-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
    overflow: hidden;
}

/* Efeito de globo luminoso */
.globe-effect {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle at 30% 30%, 
        rgba(255, 215, 0, 0.4) 0%,
        rgba(255, 215, 0, 0.2) 20%,
        rgba(255, 215, 0, 0.1) 40%,
        transparent 70%);
    border-radius: 50%;
    filter: blur(40px);
    animation: pulseGlow 8s ease-in-out infinite;
}

/* Camada de linhas de conexão */
.connection-lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.1) 0%, transparent 30%);
}

.connection-lines::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        repeating-linear-gradient(45deg, 
            transparent 0px,
            transparent 40px,
            rgba(255, 215, 0, 0.02) 40px,
            rgba(255, 215, 0, 0.02) 42px);
}

/* Partículas brilhantes */
.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ffd700;
    border-radius: 50%;
    filter: blur(2px);
    animation: float 10s infinite;
    opacity: 0.6;
}

.particle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
.particle:nth-child(2) { top: 70%; left: 80%; animation-delay: 2s; }
.particle:nth-child(3) { top: 45%; left: 45%; animation-delay: 4s; }
.particle:nth-child(4) { top: 85%; left: 25%; animation-delay: 6s; }
.particle:nth-child(5) { top: 15%; left: 90%; animation-delay: 8s; }

@keyframes pulseGlow {
    0%, 100% { 
        opacity: 0.5;
        transform: translate(-50%, -50%) scale(1);
    }
    50% { 
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.2);
    }
}

@keyframes float {
    0%, 100% { transform: translate(0, 0); opacity: 0.6; }
    25% { transform: translate(20px, -20px); opacity: 0.8; }
    50% { transform: translate(-20px, 20px); opacity: 0.4; }
    75% { transform: translate(20px, 20px); opacity: 0.8; }
}

/* Overlay sutil para melhor legibilidade */
.content-overlay {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding-top: 80px;
}
</style>

<div class="global-bg">
    <div class="globe-effect"></div>
    <div class="connection-lines"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>
