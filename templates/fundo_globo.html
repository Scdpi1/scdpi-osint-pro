<style>
.fundo-globo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: linear-gradient(135deg, #0a0f1e 0%, #1a1030 100%);
    overflow: hidden;
}

.fundo-globo::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('/static/images/globo_luminoso.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.3;
    animation: pulsarGlobo 20s ease-in-out infinite;
}

.fundo-globo::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, transparent 0%, rgba(10, 15, 30, 0.7) 100%);
    pointer-events: none;
}

@keyframes pulsarGlobo {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.05); opacity: 0.4; }
}

.conteudo-sobre-fundo {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    backdrop-filter: blur(2px);
}
</style>

<div class="fundo-globo"></div>
