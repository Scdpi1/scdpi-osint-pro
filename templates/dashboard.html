<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SCDPI OSINT PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #ffd700;
            --card-bg: rgba(10, 15, 30, 0.8);
            --border-color: rgba(255, 215, 0, 0.3);
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
        }
        
        .conteudo {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }
        
        .navbar-custom {
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent);
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-size: 2em;
            font-weight: bold;
            color: var(--accent);
            text-decoration: none;
        }
        
        .badge-plano {
            background: var(--accent);
            color: #000;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: bold;
            margin-left: 15px;
        }
        
        .card-dashboard {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        
        .card-dashboard:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        
        .consulta-label {
            font-size: 1.1em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .consulta-numero {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--accent);
        }
        
        .form-control-custom {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 15px;
            border-radius: 10px;
            width: 100%;
        }
        
        .btn-consulta {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-consulta:hover {
            background: #ccaa00;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        
        .resultado-conteudo {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            min-height: 200px;
            font-family: monospace;
            white-space: pre-wrap;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    {% include 'fundo_globo.html' %}
    
    <nav class="navbar-custom">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/" class="navbar-brand">SCDPI OSINT PRO</a>
            <div class="d-flex align-items-center gap-3">
                <span class="badge-plano">{{ usuario.plano|capitalize }}</span>
                <a href="/logout" style="color: var(--text-primary); text-decoration: none;">Sair</a>
            </div>
        </div>
    </nav>
    
    <div class="conteudo">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card-dashboard">
                    <div class="consulta-label">Consultas restantes</div>
                    <div class="consulta-numero">{{ usuario.consultas_restantes }}</div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card-dashboard">
                    <div class="consulta-label">Plano</div>
                    <div class="consulta-numero">{{ usuario.plano|capitalize }}</div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card-dashboard">
                    <div class="consulta-label">Registro</div>
                    <div class="consulta-numero" style="font-size: 1.8em;">{{ usuario.registro_profissional }}</div>
                </div>
            </div>
        </div>

        <div class="card-dashboard mt-4">
            <h4 style="color: var(--accent); margin-bottom: 20px;">Nova consulta</h4>
            <form id="consultaForm">
                <div class="row g-3">
                    <div class="col-md-3">
                        <select class="form-control-custom" id="tipo" required>
                            <option value="">Selecione</option>
                            <option value="telefone">📱 Telefone</option>
                            <option value="cpf">🆔 CPF</option>
                            <option value="cnpj">🏢 CNPJ</option>
                            <option value="email">📧 E-mail</option>
                            <option value="geo_ip">📍 Geolocalização IP</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control-custom" id="termo" 
                               placeholder="Digite o termo" required>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn-consulta">Consultar</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card-dashboard mt-4">
            <h4 style="color: var(--accent); margin-bottom: 15px;">Resultado</h4>
            <div id="resultado" class="resultado-conteudo">
                Aguardando consulta...
            </div>
        </div>
    </div>

    <script>
        document.getElementById('consultaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tipo = document.getElementById('tipo').value;
            const termo = document.getElementById('termo').value;
            const resultadoDiv = document.getElementById('resultado');
            
            if (!tipo || !termo) {
                resultadoDiv.innerHTML = '❌ Preencha todos os campos';
                return;
            }
            
            resultadoDiv.innerHTML = '🔍 Processando...';
            
            let url = '/api/consultar';
            let body = { tipo, termo };
            
            if (tipo === 'geo_ip') {
                url = '/api/geo-ip';
                body = { ip: termo };
            }
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                resultadoDiv.innerHTML = JSON.stringify(data, null, 2);
                
                if (response.ok) {
                    setTimeout(() => location.reload(), 2000);
                }
            } catch (error) {
                resultadoDiv.innerHTML = '❌ Erro: ' + error;
            }
        });
    </script>
</body>
</html>
