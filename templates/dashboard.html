<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SCDPI OSINT PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">SCDPI OSINT PRO</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white">Bem-vindo, {{ usuario.nome }}</span>
                <a class="nav-link" href="/logout">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h5>Consultas restantes</h5>
                        <h2>{{ usuario.consultas_restantes }}</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h5>Plano atual</h5>
                        <h2>{{ usuario.plano|capitalize }}</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h4>Nova consulta</h4>
                    </div>
                    <div class="card-body">
                        <form id="consultaForm">
                            <div class="row">
                                <div class="col-md-3">
                                    <select class="form-control" id="tipo" required>
                                        <option value="">Selecione o tipo</option>
                                        <option value="telefone">Telefone</option>
                                        <option value="cpf">CPF</option>
                                        <option value="cnpj">CNPJ</option>
                                        <option value="email">E-mail</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <input type="text" class="form-control" id="termo" placeholder="Digite o termo para consulta" required>
                                </div>
                                <div class="col-md-3">
                                    <button type="submit" class="btn btn-primary">Consultar</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h4>Resultado</h4>
                    </div>
                    <div class="card-body">
                        <pre id="resultado" class="bg-light p-3"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('consultaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const tipo = document.getElementById('tipo').value;
        const termo = document.getElementById('termo').value;
        
        const response = await fetch('/api/consultar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({tipo, termo})
        });
        
        const resultado = await response.json();
        document.getElementById('resultado').textContent = JSON.stringify(resultado, null, 2);
    });
    </script>
</body>
</html>
