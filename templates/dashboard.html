<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SCDPI OSINT PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #151f2c;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent: #00ff9d;
            --accent-dark: #00cc7a;
            --card-bg: rgba(20, 30, 40, 0.9);
            --border-color: #2a3a4a;
        }
        
        [data-theme="light"] {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --text-primary: #1a2a3a;
            --text-secondary: #2a3a4a;
            --accent: #0066cc;
            --accent-dark: #004c99;
            --card-bg: rgba(255, 255, 255, 0.95);
            --border-color: #c0d0e0;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            position: relative;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .navbar-custom {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .navbar-brand {
            font-size: 1.8em;
            font-weight: bold;
            background: linear-gradient(145deg, var(--accent), #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
        }
        
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .theme-toggle:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        
        .badge-plano {
            background: var(--accent);
            color: #000;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1em;
            margin-left: 15px;
        }
        
        .card-consulta {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .consulta-numero {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--accent);
        }
        
        .consulta-label {
            font-size: 1.1em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-control-custom {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 15px;
            border-radius: 10px;
            width: 100%;
        }
        
        .btn-consulta {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        
        .btn-consulta:hover {
            background: var(--accent-dark);
        }
        
        .resultado-conteudo {
            background: var(--bg-primary);
            border-radius: 10px;
            padding: 20px;
            min-height: 200px;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <nav class="navbar-custom d-flex justify-content-between align-items-center">
            <div>
                <span class="navbar-brand">SCDPI OSINT PRO</span>
                <span class="badge-plano">{{ usuario.plano|capitalize }}</span>
            </div>
            <div>
                <button class="theme-toggle" onclick="toggleTheme()">
                    🌓 Tema
                </button>
            </div>
        </nav>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card-consulta">
                    <div class="consulta-label">Consultas restantes</div>
                    <div class="consulta-numero">{{ usuario.consultas_restantes }}</div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card-consulta">
                    <div class="consulta-label">Plano</div>
                    <div class="consulta-numero">{{ usuario.plano|capitalize }}</div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card-consulta">
                    <div class="consulta-label">Registro</div>
                    <div class="consulta-numero" style="font-size: 1.8em;">{{ usuario.registro_profissional }}</div>
                </div>
            </div>
        </div>

        <div class="card-consulta mt-4">
            <h4 style="color: var(--accent); margin-bottom: 20px;">Nova consulta</h4>
            <form id="consultaForm">
                <div class="row g-3">
                    <div class="col-md-3">
                        <select class="form-control-custom" id="tipo" required>
                            <option value="">Selecione</option>
                            <option value="telefone">📱 Telefone</option>
                            <option value="cpf">🆔 CPF</option>
                            <option value="cnpj">🏢 CNPJ</option>
                            <option value="email">📧 E-mail</option>
                            <option value="geo_ip">📍 Geolocalização IP</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control-custom" id="termo" 
                               placeholder="Digite o termo" required>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn-consulta">Consultar</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card-consulta mt-4">
            <h4 style="color: var(--accent); margin-bottom: 15px;">Resultado</h4>
            <div id="resultado" class="resultado-conteudo">
                Aguardando consulta...
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);

        document.getElementById('consultaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tipo = document.getElementById('tipo').value;
            const termo = document.getElementById('termo').value;
            const resultadoDiv = document.getElementById('resultado');
            
            if (!tipo || !termo) {
                resultadoDiv.innerHTML = '❌ Preencha todos os campos';
                return;
            }
            
            resultadoDiv.innerHTML = '🔍 Processando...';
            
            let url = '/api/consultar';
            let body = { tipo, termo };
            
            if (tipo === 'geo_ip') {
                url = '/api/geo-ip';
                body = { ip: termo };
            }
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                resultadoDiv.innerHTML = JSON.stringify(data, null, 2);
                
                if (response.ok) {
                    setTimeout(() => location.reload(), 2000);
                }
            } catch (error) {
                resultadoDiv.innerHTML = '❌ Erro: ' + error.message;
            }
        });
    </script>
</body>
</html>
