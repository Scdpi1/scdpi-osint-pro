<script>
document.getElementById('consultaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const tipo = document.getElementById('tipo').value;
    const termo = document.getElementById('termo').value;
    const resultadoDiv = document.getElementById('resultado');
    
    if (!tipo || !termo) {
        resultadoDiv.innerHTML = '❌ Preencha todos os campos';
        return;
    }
    
    resultadoDiv.innerHTML = '🔍 Processando...';
    
    try {
        const response = await fetch('/api/consultar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({tipo, termo})
        });
        
        const data = await response.json();
        
        // Mostra o resultado BONITINHO
        resultadoDiv.innerHTML = JSON.stringify(data, null, 2);
        
        // Atualiza o contador SEM recarregar
        if (data.consultas_restantes !== undefined) {
            const contador = document.querySelector('.consulta-numero');
            if (contador) {
                contador.innerHTML = data.consultas_restantes;
            }
        }
        
        // NADA DE location.reload() AQUI!
        
    } catch (error) {
        resultadoDiv.innerHTML = '❌ Erro: ' + error;
    }
});
</script>
