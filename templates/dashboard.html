<script>
document.getElementById('consultaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const tipo = document.getElementById('tipo').value;
    const termo = document.getElementById('termo').value;
    const resultadoDiv = document.getElementById('resultado');
    
    if (!tipo || !termo) {
        resultadoDiv.innerHTML = '❌ Preencha todos os campos';
        return;
    }
    
    resultadoDiv.innerHTML = '🔍 Processando...';
    
    let url = '/api/consultar';
    let body = { tipo, termo };
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        
        // Tenta obter a resposta como texto primeiro
        const text = await response.text();
        console.log("Resposta bruta:", text); // Mostra no console
        
        // Tenta fazer o parse do JSON
        let data;
        try {
            data = JSON.parse(text);
        } catch (parseError) {
            // Se não for JSON, mostra o erro real
            console.error("Erro no parse:", parseError);
            resultadoDiv.innerHTML = '❌ Erro: O servidor retornou HTML em vez de JSON. Verifique os logs.';
            return;
        }
        
        // Formata o resultado bonitinho
        resultadoDiv.innerHTML = JSON.stringify(data, null, 2);
        
        // Se a consulta foi bem sucedida, atualiza a página após 2 segundos
        if (response.ok) {
            setTimeout(() => location.reload(), 2000);
        }
        
    } catch (error) {
        resultadoDiv.innerHTML = '❌ Erro na requisição: ' + error;
    }
});
</script>
