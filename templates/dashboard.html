<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SCDPI OSINT PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-consultas {
            background: linear-gradient(145deg, #1a2a3a, #0f1a24);
            border: 2px solid #00ff9d;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .badge-plano {
            background: #00ff9d;
            color: #0a0f0f;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">SCDPI OSINT PRO</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white">Bem-vindo, {{ usuario.nome }}</span>
                <a class="nav-link" href="/logout">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Cards de informação -->
        <div class="row">
            <div class="col-md-4">
                <div class="card-consultas">
                    <h5>Consultas restantes</h5>
                    <h2 class="display-4">{{ usuario.consultas_restantes }}</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-consultas">
                    <h5>Plano atual</h5>
                    <h2 class="display-4">{{ usuario.plano|capitalize }}</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-consultas">
                    <h5>Registro</h5>
                    <h4>{{ usuario.registro_profissional }}</h4>
                </div>
            </div>
        </div>

        <!-- Formulário de consulta -->
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card-consultas">
                    <h4 class="mb-4">Nova consulta</h4>
                    <form id="consultaForm">
                        <div class="row">
                            <div class="col-md-3">
                                <select class="form-control form-control-lg" id="tipo" required>
                                    <option value="">Selecione o tipo</option>
                                    <option value="telefone">📱 Telefone</option>
                                    <option value="cpf">🆔 CPF</option>
                                    <option value="cnpj">🏢 CNPJ</option>
                                    <option value="email">📧 E-mail</option>
                                    <option value="geo_ip">📍 Geolocalização IP</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <input type="text" class="form-control form-control-lg" 
                                       id="termo" placeholder="Digite o termo para consulta" required>
                            </div>
                            <div class="col-md-3">
                                <button type="submit" class="btn btn-success btn-lg w-100">
                                    🔍 Consultar
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Área de resultado -->
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card-consultas">
                    <h4 class="mb-3">Resultado</h4>
                    <pre id="resultado" class="bg-dark text-light p-4 rounded" style="min-height: 200px;"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('consultaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const tipo = document.getElementById('tipo').value;
        const termo = document.getElementById('termo').value;
        
        // Mostra loading
        document.getElementById('resultado').textContent = '🔄 Processando...';
        
        // Define a URL baseada no tipo
        let url = '/api/consultar';
        if (tipo === 'geo_ip') {
            url = '/api/geo-ip';
        }
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    tipo: tipo,
                    termo: termo,
                    ip: termo  // para geo_ip
                })
            });
            
            const resultado = await response.json();
            document.getElementById('resultado').textContent = JSON.stringify(resultado, null, 2);
            
            // Se a consulta foi bem sucedida, atualiza o contador
            if (response.ok) {
                // Recarrega a página para atualizar o contador (ou usa websocket depois)
                setTimeout(() => location.reload(), 2000);
            }
        } catch (error) {
            document.getElementById('resultado').textContent = '❌ Erro na consulta: ' + error;
        }
    });
    </script>
</body>
</html>
